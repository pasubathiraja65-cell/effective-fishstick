<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HRS Booking Portal — Shell Oman &amp; Hydrogen Systems Co</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;700;800&family=Space+Grotesk:wght@500;700&family=Sora:wght@600;700&family=Poppins:wght@600;700&family=Playfair+Display:wght@700;800&family=Inter:wght@400;500;600;700&family=Work+Sans:wght@400;500;600;700&family=Roboto:wght@400;500;600;700&family=Nunito+Sans:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#EAF4E6; --bg-soft:#F4FAF1; --surface:#FFFFFF; --surface-2:#E7F3E5;
    --line:rgba(28,58,42,0.12);
    --yellow:#1F9D55; --red:#2D8FBF; --green:#0E8A72;
    --text:#1B3A2A; --text-dim:#5C7568;
    --success:#2E9E5B; --success-soft:rgba(46,158,91,0.16);
    --danger:#E0654F; --danger-soft:rgba(224,101,79,0.14);
    --radius:16px;
    --font-display:'Unbounded',sans-serif;
    --font-body:'Inter',sans-serif;
    font-size:16px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      radial-gradient(circle at 12% -10%, color-mix(in srgb, var(--yellow) 10%, transparent), transparent 45%),
      radial-gradient(circle at 100% 0%, color-mix(in srgb, var(--red) 10%, transparent), transparent 40%),
      var(--bg);
    color:var(--text); font-family:var(--font-body); min-height:100vh;
    transition:background .25s, color .25s;
  }
  body.no-glow{background:var(--bg);}
  h1,h2,h3,.display{font-family:var(--font-display);}
  .mono{font-family:'JetBrains Mono',monospace;}
  #app{min-height:100vh;display:flex;flex-direction:column;}
  a{color:inherit;text-decoration:none;}
  button{font-family:inherit;}

  .topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 32px;border-bottom:1px solid var(--line);background:rgba(255,255,255,0.78);}
  .brand{display:flex;align-items:center;gap:14px;}
    .logo-img{height:40px;width:auto;flex-shrink:0;display:block;}
  .logo-shell{height:40px;}
  .logo-h2{height:33px;}
  .logo-div{width:1px;height:30px;background:var(--line);flex-shrink:0;}
  .brand-text .partners{font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-dim);font-weight:600;}
  .brand-text .partners b{color:var(--text);font-weight:700;}
  .brand-text .partners .x{color:var(--yellow);margin:0 6px;font-weight:700;}
  .brand-text .title{font-family:'Unbounded',sans-serif;font-size:18px;font-weight:700;line-height:1.2;margin-top:3px;}
  .topbar-right{display:flex;align-items:center;gap:14px;font-size:13px;color:var(--text-dim);}
  .pill{padding:6px 13px;border-radius:999px;border:1px solid var(--line);font-size:12.5px;color:var(--text-dim);}
  .btn-ghost{background:transparent;border:1px solid var(--line);color:var(--text);padding:8px 16px;border-radius:10px;cursor:pointer;font-size:13.5px;font-weight:500;transition:.15s;}
  .btn-ghost:hover{background:rgba(28,58,42,0.06);}

  main{flex:1;display:flex;flex-direction:column;align-items:center;padding:48px 24px 80px;}
  .hero{text-align:center;max-width:640px;margin-bottom:40px;}
  .hero h1{font-size:clamp(28px,4vw,40px);line-height:1.15;margin:0 0 14px;}
  .hero h1 span{color:var(--yellow);}
  .hero p{color:var(--text-dim);font-size:15.5px;line-height:1.6;margin:0;}

  .role-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;max-width:680px;width:100%;}
  @media (max-width:620px){.role-grid{grid-template-columns:1fr;}}
  .role-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:30px 26px;cursor:pointer;text-align:left;transition:.18s ease;}
  .role-card:hover{transform:translateY(-3px);border-color:rgba(31,157,85,0.40);background:var(--surface-2);}
  .role-card .icon{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:18px;font-size:21px;}
  .role-card.private .icon{background:rgba(31,157,85,0.16);color:var(--yellow);}
  .role-card.company .icon{background:rgba(19,168,138,0.20);color:var(--green);}
  .role-card h3{margin:0 0 8px;font-size:18px;}
  .role-card p{margin:0;color:var(--text-dim);font-size:13.5px;line-height:1.55;}
  .role-card .go{margin-top:18px;font-size:12.5px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:6px;}

  .panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:32px;width:100%;max-width:460px;}
  .panel-wide{max-width:1000px;}
  .panel h2{margin:0 0 6px;font-size:22px;}
  .panel .sub{color:var(--text-dim);font-size:13.5px;margin:0 0 26px;}
  label{display:block;font-size:12.5px;color:var(--text-dim);margin-bottom:6px;font-weight:500;}
  .field{margin-bottom:18px;}
  input,select,textarea{width:100%;background:var(--bg-soft);border:1px solid var(--line);color:var(--text);padding:11px 13px;border-radius:10px;font-size:14.5px;font-family:inherit;}
  input:focus,select:focus,textarea:focus{outline:2px solid var(--yellow);outline-offset:1px;border-color:transparent;}
  input::placeholder{color:rgba(159,185,188,0.55);}
  .btn{width:100%;padding:12px 16px;border-radius:10px;border:none;font-weight:700;font-size:14.5px;cursor:pointer;transition:.15s;}
  .btn-primary{background:var(--yellow);color:#FFFFFF;}
  .btn-primary:hover{background:#ffd93f;}
  .btn-primary:disabled{background:rgba(31,157,85,0.35);color:#fff;cursor:not-allowed;}
  .btn-secondary{background:var(--surface-2);color:var(--text);}
  .error-box{background:var(--danger-soft);color:var(--danger);border:1px solid rgba(255,107,94,0.3);padding:11px 14px;border-radius:10px;font-size:13px;margin-bottom:18px;line-height:1.5;}
  .info-box{padding:12px 14px;border-radius:10px;font-size:13px;margin-bottom:18px;line-height:1.55;border:1px solid var(--line);}
  .info-box.wait{background:var(--success-soft);border-color:rgba(46,158,91,0.35);color:#1B3A2A;}
  .info-box.stop{background:var(--danger-soft);border-color:rgba(224,101,79,0.35);color:#7a2a1d;}
  .hint{font-size:11.5px;color:var(--text-dim);margin-top:6px;}
  .back-link{display:inline-flex;align-items:center;gap:6px;color:var(--text-dim);font-size:13px;margin-bottom:20px;cursor:pointer;background:none;border:none;font-family:inherit;}
  .back-link:hover{color:var(--text);}

  .week-label{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:6px;}
  .week-label .wk{font-size:13px;color:var(--text-dim);}
  .day-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:8px;}
  @media (max-width:760px){.day-grid{grid-template-columns:repeat(3,1fr);}}
  @media (max-width:460px){.day-grid{grid-template-columns:repeat(2,1fr);}}
  .day-card{border:1.5px solid var(--line);border-radius:13px;padding:14px 10px;text-align:center;cursor:pointer;background:var(--bg-soft);transition:.15s;}
  .day-card.selected{border-color:var(--yellow);background:rgba(31,157,85,0.12);}
  .day-card.full{opacity:0.45;cursor:not-allowed;}
  .day-card.past{opacity:0.3;cursor:not-allowed;}
  .day-card .dname{font-size:12px;font-weight:700;letter-spacing:.03em;}
  .day-card .ddate{font-size:11px;color:var(--text-dim);margin:2px 0 10px;}
  .gauge{width:50px;height:50px;border-radius:50%;margin:0 auto 6px;position:relative;display:flex;align-items:center;justify-content:center;}
  .gauge::before{content:"";position:absolute;inset:0;border-radius:50%;background:conic-gradient(var(--g-color) calc(var(--pct)*1%), rgba(28,58,42,0.10) 0);}
  .gauge::after{content:"";position:absolute;inset:6px;border-radius:50%;background:var(--bg-soft);}
  .gauge span{position:relative;z-index:1;font-size:10px;font-weight:700;font-family:'JetBrains Mono',monospace;}
  .day-card .slots-n{font-size:10.5px;color:var(--text-dim);margin-top:2px;}
  .full-tag{font-size:10px;font-weight:700;letter-spacing:.05em;color:var(--danger);text-transform:uppercase;}

  .hour-section{margin-top:22px;}
  .hour-section h4{margin:0 0 12px;font-size:13px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.05em;font-weight:600;}
  .hour-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:10px;}
  .hour-chip{border:1.5px solid var(--line);border-radius:11px;padding:11px 8px;text-align:center;cursor:pointer;background:var(--bg-soft);transition:.15s;}
  .hour-chip .htime{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:13.5px;}
  .hour-chip .hrem{font-size:10.5px;color:var(--text-dim);margin-top:3px;}
  .hour-chip.selected{border-color:var(--yellow);background:rgba(31,157,85,0.12);}
  .hour-chip.unavailable{opacity:0.4;cursor:not-allowed;}
  .hour-chip.blocked .hrem{color:var(--danger);}

  .confirm-icon{width:60px;height:60px;border-radius:50%;background:var(--success-soft);color:var(--success);display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 18px;}
  .ticket{background:var(--bg-soft);border:1px dashed var(--line);border-radius:12px;padding:18px;margin:20px 0;}
  .ticket-row{display:flex;justify-content:space-between;font-size:13.5px;padding:6px 0;gap:14px;}
  .ticket-row span:first-child{color:var(--text-dim);}
  .ticket-row span:last-child{font-family:'JetBrains Mono',monospace;font-weight:600;text-align:right;}

  .admin-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px;width:100%;max-width:1000px;}
  .admin-grid .panel{max-width:none;}
  @media (max-width:820px){.admin-grid{grid-template-columns:1fr;}}
  .admin-list{display:flex;flex-direction:column;gap:10px;}
  .admin-row{background:var(--bg-soft);border:1px solid var(--line);border-radius:12px;padding:13px;display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;}
  @media (max-width:620px){.admin-row{grid-template-columns:1fr;}}
  .admin-row strong{display:block;font-size:13.5px;margin-bottom:4px;}
  .admin-meta{font-size:12px;color:var(--text-dim);line-height:1.45;}
  .admin-actions{display:flex;gap:8px;align-items:center;justify-content:flex-end;flex-wrap:wrap;}
  .admin-actions .btn{width:auto;padding:8px 11px;font-size:12.5px;}
  .btn-danger{background:var(--danger-soft);color:var(--danger);}
  .mini-fields{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;}
  @media (max-width:520px){.mini-fields{grid-template-columns:1fr;}}
  .stat-line{display:flex;justify-content:space-between;gap:12px;border-bottom:1px solid var(--line);padding:9px 0;font-size:13px;}
  .stat-line:last-child{border-bottom:none;}
  .status-pill{display:inline-flex;align-items:center;border:1px solid var(--line);border-radius:999px;padding:3px 8px;font-size:11px;text-transform:capitalize;color:var(--text-dim);}

  footer{text-align:center;padding:18px;color:var(--text-dim);font-size:11.5px;display:flex;flex-direction:column;gap:8px;align-items:center;}
  .footer-links{display:flex;gap:18px;flex-wrap:wrap;justify-content:center;}
  .footer-links a{color:var(--text-dim);text-decoration:underline;}
  .footer-links a:hover{color:var(--text);}

  .customize-fab{position:fixed;bottom:24px;right:24px;z-index:40;background:var(--yellow);color:#FFFFFF;border:none;border-radius:999px;padding:13px 20px;font-weight:700;font-size:13.5px;cursor:pointer;box-shadow:0 8px 24px rgba(0,0,0,0.35);display:flex;align-items:center;gap:8px;}
  .customize-fab:hover{background:#ffd93f;}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:49;opacity:0;pointer-events:none;transition:opacity .2s;}
  .overlay.open{opacity:1;pointer-events:auto;}
  .customize-panel{position:fixed;top:0;right:0;height:100%;width:360px;max-width:92vw;background:var(--surface);border-left:1px solid var(--line);z-index:50;transform:translateX(100%);transition:transform .25s ease;display:flex;flex-direction:column;}
  .customize-panel.open{transform:translateX(0);}
  .cp-head{padding:20px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;}
  .cp-head h3{margin:0;font-size:16px;}
  .cp-close{background:none;border:none;color:var(--text-dim);font-size:20px;cursor:pointer;line-height:1;}
  .cp-body{flex:1;overflow-y:auto;padding:18px 22px;}
  .cp-group{margin-bottom:24px;}
  .cp-group h4{margin:0 0 12px;font-size:11.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-dim);font-weight:600;}
  .cp-row{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px;}
  .cp-row label{margin:0;font-size:13px;color:var(--text);font-weight:400;flex:1;}
  .cp-row input[type="color"]{width:42px;height:30px;padding:0;border:1px solid var(--line);border-radius:8px;cursor:pointer;background:none;}
  .cp-row select{width:auto;min-width:150px;padding:7px 9px;font-size:12.5px;}
  .cp-row input[type="range"]{width:130px;accent-color:var(--yellow);}
  .cp-row .rangeval{font-size:11.5px;color:var(--text-dim);width:34px;text-align:right;font-family:'JetBrains Mono',monospace;}
  .cp-foot{padding:18px 22px;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:10px;}
  .cp-toast{font-size:12px;color:var(--success);text-align:center;display:none;margin-top:-4px;margin-bottom:2px;}
</style>
</head>

/* ============================ DATE HELPERS ============================ */
function pad(n){ return n<10 ? '0'+n : ''+n; }
function isoOf(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function startOfDay(d){ const c=new Date(d); c.setHours(0,0,0,0); return c; }
function getActiveWeekStart(today){
  const day = today.getDay();
  if (day === 5) { const d = startOfDay(today); d.setDate(d.getDate()+1); return d; }
  const diff = (day - 6 + 7) % 7;
  const d = startOfDay(today); d.setDate(d.getDate()-diff);
  return d;
}
function getActiveWeekDates(){
  const start = getActiveWeekStart(new Date());
  const dates = [];
  for(let i=0;i<6;i++){ const d=new Date(start); d.setDate(start.getDate()+i); dates.push(d); }
  return dates;
}
function weekKeyFor(dateObj){ return isoOf(getActiveWeekStart(dateObj)); }
function fmtShort(d){ return d.toLocaleDateString('en-GB',{ day:'2-digit', month:'short' }); }
function weekdayNameOf(dateObj){ return ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][dateObj.getDay()]; }

/* ============================ SLOT / CAPACITY LOGIC ============================ */
function activeBookings(){ return state.bookings.filter(b=>!['cancelled','no_show'].includes(b.status)); }
function todayISO(){ return isoOf(new Date()); }
function bookingsToday(){ const t=todayISO(); return loadBookings().filter(b=>b.dateISO===t); }
function completedBookings(){ return loadBookings().filter(b=>b.status==='completed'); }
function sumFuel(rows){ return rows.reduce((a,b)=>a+(parseFloat(b.kgFilled)||0),0); }
function dayBookings(dateISO){ return activeBookings().filter(b=>b.dateISO===dateISO); }
function periodOf(time){ return parseInt((time||'00:00').split(':')[0],10) < 12 ? 'morning' : 'afternoon'; }
function bookingsForPeriod(dateISO, period){ return dayBookings(dateISO).filter(b=>periodOf(b.time)===period); }
function staffOperators(){ return loadConfig().operators || []; }
function parseTimes(raw){ return (raw||'').split(',').map(s=>s.trim()).filter(Boolean); }
function expandRange(start, end){
  const out = [];
  if(!start || !end) return out;
  let [sh,sm] = start.split(':').map(Number);
  let [eh,em] = end.split(':').map(Number);
  let cur = sh*60+sm; const stop = eh*60+em;
  while(cur < stop){ out.push(pad(Math.floor(cur/60))+':'+pad(cur%60)); cur += 60; }
  return out;
}
// Station-wide blocked hours for the day (apply to BOTH private and company)
function stationBlocked(weekday){ return parseTimes(state.config[weekday].blocked); }
function rangesOf(weekday, role){ return (state.config[weekday][role] && state.config[weekday][role].ranges) || []; }
// Map of available hour -> cars allowed that hour (each time block carries its own cars/hr), minus station-blocked hours
function slotMap(weekday, role){
  const blocked = stationBlocked(weekday); const map={};
  rangesOf(weekday, role).forEach(r=>{ expandRange(r.start, r.end).forEach(h=>{ if(!blocked.includes(h)) map[h]=Math.max(0, r.perHour||0); }); });
  return map;
}
function slotsForRoleDay(weekday, role){ const m=slotMap(weekday, role); return Object.keys(m).filter(h=>m[h]>0).sort(); }
function capacityAt(weekday, role, time){ return slotMap(weekday, role)[time]||0; }
function dayTotalCapacity(weekday, role){ const m=slotMap(weekday, role); return Object.values(m).reduce((a,b)=>a+b,0); }
function weeklyLimitFor(role){ const v=state.config.weeklyLimits && state.config.weeklyLimits[role]; const n=parseInt(v,10); return isNaN(n)?1:Math.max(1,n); }
function bookingsForSlot(dateISO, role, time){ return activeBookings().filter(b=>b.dateISO===dateISO && b.role===role && b.time===time); }
function bookingsForDateRole(dateISO, role){ return activeBookings().filter(b=>b.dateISO===dateISO && b.role===role); }
function dailyLimitReached(dateISO){ const n=parseInt(state.config.totalDailyLimit,10); return n>0 && dayBookings(dateISO).length >= n; }
function periodLimitReached(dateISO,time){
  const p = periodOf(time);
  const limit = parseInt(p==='morning' ? state.config.slotPeriods?.morningLimit : state.config.slotPeriods?.afternoonLimit,10);
  return limit > 0 && bookingsForPeriod(dateISO,p).length >= limit;
}
function withinBookingWindow(dateISO,time){
  const s = state.config.bookingSettings || {};
  if(s.openingTime && time < s.openingTime) return false;
  if(s.closingTime && time >= s.closingTime) return false;
  return true;
}
function cutoffPassed(){
  const s = state.config.bookingSettings || {};
  if(!s.cutoffTime) return false;
  const now = new Date();
  return pad(now.getHours())+':'+pad(now.getMinutes()) > s.cutoffTime;
}
function alreadyBookedThisWeek(mobile, carNo, weekKey, excludeId){
  return activeBookings().some(b => b.id!==excludeId && b.weekKey===weekKey &&
    (b.mobile.trim()===mobile.trim() || b.carNo.trim().toUpperCase()===carNo.trim().toUpperCase()));
}

const DEFAULT_THEME = {
  bg:'#EAF4E6', surface:'#FFFFFF', surface2:'#E7F3E5', text:'#1B3A2A', textDim:'#5C7568',
  yellow:'#1F9D55', red:'#2D8FBF', success:'#2E9E5B', danger:'#E0654F',
  radius:16, glow:true, fontDisplay:"'Unbounded',sans-serif", fontBody:"'Inter',sans-serif",
};
let theme = { ...DEFAULT_THEME };
const VAR_MAP = { bg:'--bg', surface:'--surface', surface2:'--surface-2', text:'--text', textDim:'--text-dim', yellow:'--yellow', red:'--red', success:'--success', danger:'--danger', fontDisplay:'--font-display', fontBody:'--font-body' };
function applyTheme(){
  const root = document.documentElement;
  Object.keys(VAR_MAP).forEach(k=> root.style.setProperty(VAR_MAP[k], theme[k]));
  root.style.setProperty('--radius', theme.radius+'px');
  root.style.setProperty('--success-soft', hexToRgba(theme.success,0.16));
  root.style.setProperty('--danger-soft', hexToRgba(theme.danger,0.14));
  document.body.classList.toggle('no-glow', !theme.glow);
}
function hexToRgba(hex,a){ const h=hex.replace('#',''); return `rgba(${parseInt(h.substring(0,2),16)},${parseInt(h.substring(2,4),16)},${parseInt(h.substring(4,6),16)},${a})`; }
function setThemeVal(k,v){ theme[k]=v; applyTheme(); }
function toggleGlow(c){ theme.glow=c; applyTheme(); }
function resetTheme(){ if(!confirm('Reset background, colors and fonts back to the original look?')) return; theme={...DEFAULT_THEME}; applyTheme(); render(); }
function toggleCustomize(o){ state.customizeOpen=o; render(); }

function continueToBooking(){
  const name = document.getElementById('f-name').value.trim();
  const mobile = document.getElementById('f-mobile').value.trim();
  const email = document.getElementById('f-email').value.trim();
  const carNo = document.getElementById('f-car').value.trim();
  state.gateNotice = null;
  state.config = loadConfig();
  if(!name || !mobile || !carNo){
    state.bookingError = 'Please fill in name, mobile and car number to continue.';
    state.bookingForm = {...state.bookingForm, name, mobile, email, carNo}; render(); return;
  }
  if(state.config.maintenance && state.config.maintenance.active){
    state.bookingError = '';
    state.bookingForm = {...state.bookingForm, name, mobile, email, carNo};
    state.gateNotice = { kind:'stop', text:state.config.maintenance.message };
    render(); return;
  }
  state.bookingForm = {...state.bookingForm, name, mobile, email, carNo};
  state.bookings = loadBookings();

  // --- approval gate ---
  const owner = findOwner(mobile, carNo);
  const status = owner ? (owner.status || 'approved') : 'new';
  if(status === 'pending'){
    state.bookingError = '';
    state.gateNotice = { kind:'wait', text:'Your registration is awaiting station approval. You will be able to book a slot once the station approves you.' };
    render(); return;
  }
  if(status === 'rejected'){
    state.bookingError = '';
    state.gateNotice = { kind:'stop', text:'Your registration was not approved by the station. Please contact the station for assistance.' };
    render(); return;
  }
  if(status === 'new'){
    registerPendingOwner({ name, mobile, email, carNo, role: state.role });
    state.bookingError = '';
    state.gateNotice = { kind:'wait', text:'Thanks — your registration has been sent to the station for approval. You can book a slot here once you are approved.' };
    render(); return;
  }
  // approved but temporarily suspended by the station
  if(owner && owner.blockedUntil && Date.now() < new Date(owner.blockedUntil).getTime()){
    state.bookingError = '';
    state.gateNotice = { kind:'stop', text:'Your booking is temporarily suspended by the station until '+new Date(owner.blockedUntil).toLocaleString('en-GB')+'. Please try again after that time.' };
    render(); return;
  }
  // approved: keep owner details fresh, then proceed
  if(email && owner && !owner.email){ owner.email = email; const all=loadOwners(); const idx=all.findIndex(x=>x.id===owner.id); if(idx>=0){ all[idx]=owner; saveOwners(all);} }

  const weekKey = weekKeyFor(new Date());
  const limit = weeklyLimitFor(state.role);
  if(bookingsThisWeekForCar(mobile, carNo, weekKey).length >= limit){
    state.bookingError = `This car has reached its weekly limit of ${limit} booking${limit>1?'s':''} for this week. Please try again next week.`;
    render(); return;
  }
  state.bookingForm = { name, mobile, email, carNo, dateISO:null, time:null };
  state.bookingError=''; state.gateNotice=null; state.screen='booking'; render();
}

function bookingScreen(){
  state.config = loadConfig(); state.bookings = loadBookings();
  const weekDates = getActiveWeekDates();
  const today = startOfDay(new Date());
  const role = state.role;

  const dayCards = weekDates.map(d=>{
    const wd = weekdayNameOf(d);
    const dateISO = isoOf(d);
    const total = dayTotalCapacity(wd, role);
    const bookedCount = bookingsForDateRole(dateISO, role).length;
    const remaining = total - bookedCount;
    const isPast = d < today;
    const isFull = remaining <= 0 || dailyLimitReached(dateISO);
    const selected = state.bookingForm.dateISO === dateISO;
    const pct = total>0 ? Math.min(100, Math.round((bookedCount/total)*100)) : 100;
    const gcolor = isFull ? 'var(--danger)' : (pct>70 ? 'var(--yellow)' : 'var(--success)');
    const cls = ['day-card', selected?'selected':'', isFull?'full':'', isPast?'past':''].join(' ').trim();
    return `<div class="${cls}" ${(!isPast && !isFull) ? `onclick="selectDay('${dateISO}')"` : ''}>
      <div class="dname">${wd.slice(0,3).toUpperCase()}</div>
      <div class="ddate">${fmtShort(d)}</div>
      <div class="gauge" style="--pct:${pct};--g-color:${gcolor}"><span>${remaining<0?0:remaining}</span></div>
      <div class="slots-n">slots left</div>
      ${isFull ? '<div class="full-tag">Full</div>' : ''}
      ${isPast ? '<div class="full-tag" style="color:var(--text-dim)">Past</div>' : ''}
    </div>`;
  }).join('');

  let hourSection = '';
  if(state.bookingForm.dateISO){
    const dateISO = state.bookingForm.dateISO;
    const wd = weekdayNameOf(new Date(dateISO));
    const slots = slotsForRoleDay(wd, role);
    const chips = slots.map(t=>{
      const remaining = capacityAt(wd, role, t) - bookingsForSlot(dateISO, role, t).length;
      const unavailable = remaining<=0 || dailyLimitReached(dateISO) || periodLimitReached(dateISO,t) || !withinBookingWindow(dateISO,t);
      const selected = state.bookingForm.time === t;
      const cls = ['hour-chip', selected?'selected':'', unavailable?'unavailable':''].join(' ').trim();
      return `<div class="${cls}" ${!unavailable ? `onclick="selectHour('${t}')"` : ''}>
        <div class="htime">${t}</div>
        <div class="hrem">${unavailable ? 'Closed' : remaining+' left'}</div>
      </div>`;
    }).join('') || `<div class="hint">No refuelling hours available for ${role==='private'?'private users':'company cars'} on this day. Try another day or check back later.</div>`;
    hourSection = `<div class="hour-section"><h4>Available times — ${wd}, ${fmtShort(new Date(dateISO))}</h4><div class="hour-grid">${chips}</div></div>`;
  }

  return `
  <button class="back-link" onclick="goUserLogin(state.role)">← Edit details</button>
  <div class="panel panel-wide">
    <h2>Choose your refuelling slot</h2>
    <p class="sub">Booking as <strong>${escapeHTML(state.bookingForm.name)}</strong> · ${escapeHTML(state.bookingForm.mobile)} · ${escapeHTML(state.bookingForm.carNo)}.</p>
    ${state.bookingError ? `<div class="error-box">${state.bookingError}</div>` : ''}
    <div class="week-label">
      <div class="wk">Week of ${fmtShort(weekDates[0])} – ${fmtShort(weekDates[5])} (Sat–Thu)</div>
      <div class="wk" style="color:var(--text-dim)">Friday — week off</div>
    </div>
    <div class="day-grid">${dayCards}</div>
    ${hourSection}
    <div style="margin-top:24px;"><button class="btn btn-primary" ${(!state.bookingForm.dateISO || !state.bookingForm.time) ? 'disabled' : ''} onclick="confirmBooking()">Confirm slot</button></div>
  </div>`;
}
function selectDay(dateISO){ state.bookingForm.dateISO=dateISO; state.bookingForm.time=null; state.bookingError=''; render(); }
function selectHour(time){ state.bookingForm.time=time; state.bookingError=''; render(); }

function confirmBooking(){
  const { name, mobile, email, carNo, dateISO, time } = state.bookingForm;
  if(!dateISO || !time) return;
  state.bookings = loadBookings();
  // re-check approval / temporary block in case the station changed it while choosing a slot
  const owner = findOwner(mobile, carNo);
  if(owner && (owner.status||'approved') !== 'approved'){
    state.screen='userLogin';
    state.gateNotice = { kind:'wait', text:'Your booking access is pending station approval. Please try again once approved.' };
    render(); return;
  }
  if(owner && owner.blockedUntil && Date.now() < new Date(owner.blockedUntil).getTime()){
    state.screen='userLogin';
    state.gateNotice = { kind:'stop', text:'Your booking is temporarily suspended by the station until '+new Date(owner.blockedUntil).toLocaleString('en-GB')+'.' };
    render(); return;
  }
  const weekKey = weekKeyFor(new Date(dateISO));
  const limit = weeklyLimitFor(state.role);
  if(bookingsThisWeekForCar(mobile, carNo, weekKey).length >= limit){
    state.bookingError = `This car has reached its weekly limit of ${limit} booking${limit>1?'s':''}. Please try again next week.`;
    render(); return;
  }
  const wd = weekdayNameOf(new Date(dateISO));
  if(!slotsForRoleDay(wd, state.role).includes(time)){ state.bookingError='That time is no longer available (the station may have blocked it) — please pick another time.'; render(); return; }
  if(bookingsForSlot(dateISO, state.role, time).length >= capacityAt(wd, state.role, time)){ state.bookingError='That time just filled up — please pick another time.'; render(); return; }
  const booking = {
    id: 'bk_'+Date.now()+'_'+Math.random().toString(36).slice(2,7),
    role: state.role, name, mobile, email, carNo,
    dateISO, weekday: wd, weekKey, time,
    status:'booked', adminComment:'', history:[],
    createdAt: new Date().toISOString(),
  };
  state.bookings.push(booking);
  saveBookings(state.bookings);
  registerOwner(booking);
  state.lastBooking = booking;
  state.screen='success'; render();
}
function bookingsThisWeekForCar(mobile, carNo, weekKey){
  const key = s => (s||'').trim().toUpperCase();
  return activeBookings().filter(b => b.weekKey===weekKey && (b.mobile.trim()===mobile.trim() || key(b.carNo)===key(carNo)));
}

function findOwner(mobile, carNo){
  const key = s => (s||'').trim().toUpperCase();
  return loadOwners().find(x => (x.mobile && x.mobile.trim()===mobile.trim()) || (x.carNo && key(x.carNo)===key(carNo)));
}
// First-time user: create a PENDING owner that the admin must approve before booking.
function registerPendingOwner(d){
  const owners = loadOwners();
  if(findOwner(d.mobile, d.carNo)) return; // already exists
  const now = new Date().toISOString();
  const o = { id:'ow_'+Date.now()+'_'+Math.random().toString(36).slice(2,6),
    name:d.name, mobile:d.mobile, email:d.email||'', carNo:d.carNo, role:d.role,
    firstSeen:now, lastBooking:null, count:0, seenByAdmin:false, status:'pending' };
  owners.push(o);
  saveOwners(owners);
  notifyNewOwner(o);
}
// Approved owner completed a booking: bump their count / details.
function registerOwner(b){
  const owners = loadOwners();
  const key = s => (s||'').trim().toUpperCase();
  let o = owners.find(x => (x.mobile && x.mobile.trim()===b.mobile.trim()) || (x.carNo && key(x.carNo)===key(b.carNo)));
  const now = new Date().toISOString();
  if(o){
    o.count = (o.count||0)+1; o.lastBooking = now;
    o.name = b.name; o.role = b.role; if(b.email) o.email = b.email; o.carNo = b.carNo; o.mobile = b.mobile;
  } else {
    // safety: shouldn't happen (gate creates pending first), but keep data consistent
    o = { id:'ow_'+Date.now()+'_'+Math.random().toString(36).slice(2,6),
          name:b.name, mobile:b.mobile, email:b.email||'', carNo:b.carNo, role:b.role,
          firstSeen:now, lastBooking:now, count:1, seenByAdmin:false, status:'approved' };
    owners.push(o);
  }
  saveOwners(owners);
}
// If the admin set an "auto-email webhook" URL, send the new owner there so they get an email automatically.
function notifyNewOwner(o){
  const url = loadWebhook();
  if(!url) return;
  try{
    fetch(url, { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ event:'new_car_owner', to: loadAdminEmail(),
        owner:{ name:o.name, mobile:o.mobile, email:o.email, carNo:o.carNo, type:o.role },
        at: o.firstSeen }) }).catch(()=>{});
  }catch(e){}
}

            <option value="'Poppins',sans-serif" ${t.fontDisplay.includes('Poppins')?'selected':''}>Poppins</option>
            <option value="'Playfair Display',serif" ${t.fontDisplay.includes('Playfair')?'selected':''}>Playfair Display (elegant)</option>
          </select></div>
        <div class="cp-row"><label>Body text</label>
          <select onchange="setThemeVal('fontBody', this.value)">
            <option value="'Inter',sans-serif" ${t.fontBody.includes('Inter')?'selected':''}>Inter</option>
            <option value="'Work Sans',sans-serif" ${t.fontBody.includes('Work Sans')?'selected':''}>Work Sans</option>
            <option value="'Roboto',sans-serif" ${t.fontBody.includes('Roboto')?'selected':''}>Roboto</option>
            <option value="'Nunito Sans',sans-serif" ${t.fontBody.includes('Nunito')?'selected':''}>Nunito Sans</option>
          </select></div>
      </div>
      <div class="cp-group"><h4>Shape</h4>
        <div class="cp-row"><label>Corner roundness</label>
          <input type="range" min="0" max="28" value="${t.radius}" oninput="setThemeVal('radius', parseInt(this.value)); this.nextElementSibling.textContent=this.value+'px'">
          <span class="rangeval">${t.radius}px</span></div>
      </div>
    </div>
    <div class="cp-foot">
      <div class="cp-toast" id="cpToast">Copied — paste this back to Claude to make it permanent.</div>
      <button class="btn btn-secondary" onclick="copyThemeCode()">Copy my theme settings</button>
      <button class="btn btn-danger" onclick="resetTheme()" style="background:var(--danger-soft);color:var(--danger);">Reset to default look</button>
    </div>
  </div>`;
}

// Added Functions
  function toggleMaintenance() {
    const cfg = loadConfig();
    const messageEl = document.getElementById("maintenance-message");
    const current = cfg.maintenance || { active:false, message:"Station is currently under maintenance. Booking is temporarily unavailable." };
    cfg.maintenance = {
      active: !current.active,
      message: (messageEl && messageEl.value.trim()) || current.message || "Station is currently under maintenance. Booking is temporarily unavailable."
    };
    saveConfig(cfg);
    state.config = cfg;
    alert(cfg.maintenance.active ? "Maintenance mode is now ON. Users cannot book." : "Maintenance mode is now OFF. Users can book again.");
    render();
  }

  function saveAdminSettings() {
    const privateLimitEl = document.getElementById("admin-private-limit");
    const companyLimitEl = document.getElementById("admin-company-limit");
    const totalDailyEl = document.getElementById("admin-total-daily-limit");
    const morningLimitEl = document.getElementById("admin-morning-limit");
    const afternoonLimitEl = document.getElementById("admin-afternoon-limit");
    const messageEl = document.getElementById("maintenance-message");
    const openingEl = document.getElementById("admin-opening-time");
    const closingEl = document.getElementById("admin-closing-time");
    const advanceEl = document.getElementById("admin-advance-days");
    const cutoffEl = document.getElementById("admin-cutoff-time");
    const cfg = loadConfig();
    if(privateLimitEl && companyLimitEl){
      cfg.weeklyLimits = {
        private: Math.max(1, parseInt(privateLimitEl.value, 10) || 1),
        company: Math.max(1, parseInt(companyLimitEl.value, 10) || 1)
      };
    }
    if(totalDailyEl) cfg.totalDailyLimit = Math.max(1, parseInt(totalDailyEl.value, 10) || 1);
    if(morningLimitEl || afternoonLimitEl){
      cfg.slotPeriods = cfg.slotPeriods || {};
      if(morningLimitEl) cfg.slotPeriods.morningLimit = Math.max(0, parseInt(morningLimitEl.value, 10) || 0);
      if(afternoonLimitEl) cfg.slotPeriods.afternoonLimit = Math.max(0, parseInt(afternoonLimitEl.value, 10) || 0);
    }
    if(openingEl || closingEl || advanceEl || cutoffEl){
      cfg.bookingSettings = cfg.bookingSettings || {};
      if(openingEl) cfg.bookingSettings.openingTime = openingEl.value || '08:00';
      if(closingEl) cfg.bookingSettings.closingTime = closingEl.value || '20:00';
      if(advanceEl) cfg.bookingSettings.advanceDays = Math.max(1, parseInt(advanceEl.value, 10) || 6);
      if(cutoffEl) cfg.bookingSettings.cutoffTime = cutoffEl.value || '18:00';
    }
    WEEKDAYS.forEach(day => {
      const el = document.getElementById('blocked-'+day);
      if(el && cfg[day]) cfg[day].blocked = el.value.trim();
    });
    cfg.maintenance = cfg.maintenance || { active:false, message:"Station is currently under maintenance. Booking is temporarily unavailable." };
    if (messageEl) cfg.maintenance.message = messageEl.value.trim() || cfg.maintenance.message;
    saveConfig(cfg);
    state.config = cfg;
    alert("Admin settings saved. Friday remains a holiday.");
    render();
  }

  function completeFilling() {
    const id = document.getElementById("op-booking-id").value.trim();
    const kg = parseFloat(document.getElementById("op-kg-filled").value);
    if (!id || isNaN(kg) || kg <= 0) {
      alert("Enter a valid booking ID and H2 filled amount.");
      return;
    }
    const bookings = loadBookings();
    const booking = bookings.find(b => b.id === id);
    if (!booking) {
      alert("Booking ID not found.");
      return;
    }
    booking.status = "completed";
    booking.kgFilled = kg;
    booking.completedAt = new Date().toISOString();
    booking.history = booking.history || [];
    booking.history.push({ action:"completed", kgFilled:kg, at:booking.completedAt });
    saveBookings(bookings);
    state.bookings = bookings;
    alert(`Filling logged: ${kg} kg for ${id}`);
    render();
  }

  function downloadReport() {
    const rows = loadBookings();
    const fields = ["id","status","role","name","mobile","email","carNo","dateISO","weekday","time","kgFilled","createdAt","completedAt"];
    const csv = [fields.join(",")].concat(rows.map(b => fields.map(f => csvCell(b[f])).join(","))).join("\n");
    const blob = new Blob([csv], { type:"text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "hrs-bookings-report.csv";
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
}
function csvCell(v){
  const s = String(v ?? '');
  return /[",\n]/.test(s) ? `"${s.replace(/"/g,'""')}"` : s;
}
function escapeHTML(s){ return String(s ?? '').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escapeAttr(s){ return escapeHTML(s); }

applyTheme();
render();
</script>
